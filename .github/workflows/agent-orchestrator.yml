name: Agent Loop Orchestrator

on:
  push:
    branches:
      - "feat/**"
      - "fix/**"
      - "refactor/**"
    paths:
      - "dagster-pipeline/**"
  pull_request:
    types: [opened, synchronize]
    paths:
      - "dagster-pipeline/**"

concurrency:
  group: "agent-loop-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  detect-flow:
    runs-on: ubuntu-latest
    outputs:
      flow_name: ${{ steps.detect.outputs.flow_name }}
      branch: ${{ steps.detect.outputs.branch }}
      iteration: ${{ steps.detect.outputs.iteration }}
      pr_number: ${{ steps.detect.outputs.pr_number }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect flow and PR number
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          set -e

          if [ -n "$EVENT_PR_NUMBER" ]; then
            PR_NUMBER="$EVENT_PR_NUMBER"
          else
            PR_NUMBER=$(gh pr list --head "$BRANCH_NAME" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for branch $BRANCH_NAME"
            echo "flow_name=skip" >> "$GITHUB_OUTPUT"
            echo "branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
            echo "iteration=0" >> "$GITHUB_OUTPUT"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "PR: $PR_NUMBER"

          CHANGED=$(gh pr diff "$PR_NUMBER" --name-only 2>/dev/null || echo "")

          FLOW=$(echo "$CHANGED" \
            | grep "dagster-pipeline/src/dagster_pipeline/defs/" \
            | sed 's|dagster-pipeline/src/dagster_pipeline/defs/||' \
            | cut -d'/' -f1 \
            | grep -Ev "^$|data_lakehouse|maintenance|observability|pipeline_asset" \
            | head -1)

          if [ -z "$FLOW" ]; then
            FLOW=$(echo "$CHANGED" \
              | grep "dagster-pipeline/tests/" \
              | sed 's|dagster-pipeline/tests/||' \
              | cut -d'/' -f1 \
              | head -1)
          fi

          if [ -z "$FLOW" ]; then
            FLOW="unknown"
          fi

          LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name' 2>/dev/null || echo "")
          ITERATION=1
          if echo "$LABELS" | grep -q "iteration/3"; then
            ITERATION=3
          elif echo "$LABELS" | grep -q "iteration/2"; then
            ITERATION=2
          fi

          echo "flow_name=$FLOW" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "iteration=$ITERATION" >> "$GITHUB_OUTPUT"

  test:
    needs: detect-flow
    runs-on: ubuntu-latest
    if: |
      needs.detect-flow.outputs.flow_name != 'unknown' &&
      needs.detect-flow.outputs.flow_name != 'skip' &&
      needs.detect-flow.outputs.pr_number != ''
    outputs:
      test_status: ${{ steps.check-result.outputs.test_status }}
      test_summary: ${{ steps.check-result.outputs.test_summary }}

    steps:
      - name: Ensure labels exist and reset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.detect-flow.outputs.pr_number }}
        run: |
          LABELS="tests/passed tests/failed review/approved review/changes-requested confidence/high confidence/medium confidence/low iteration/1 iteration/2 iteration/3 needs-human-intervention"
          for L in $LABELS; do
            gh label create "$L" --color "0075ca" 2>/dev/null || true
          done
          gh pr edit "$PR_NUMBER" --remove-label "tests/passed" 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --remove-label "tests/failed" 2>/dev/null || true

      - name: Call test specialist
        env:
          PR_NUMBER: ${{ needs.detect-flow.outputs.pr_number }}
          FLOW_NAME: ${{ needs.detect-flow.outputs.flow_name }}
          BRANCH: ${{ needs.detect-flow.outputs.branch }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
          CHAT_AGENT_URL: ${{ secrets.CHAT_AGENT_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGED_FILES=$(gh pr diff "$PR_NUMBER" --name-only 2>/dev/null | head -20 | tr '\n' ',' | sed 's/,$//')

          echo "Calling /agent/test for PR #$PR_NUMBER flow=$FLOW_NAME"

          RESPONSE=$(curl -sf \
            -X POST "$CHAT_AGENT_URL/agent/test" \
            -H "Authorization: Bearer $AGENT_SECRET" \
            -H "Content-Type: application/json" \
            -d "{\"pr_number\": $PR_NUMBER, \"branch\": \"$BRANCH\", \"flow_name\": \"$FLOW_NAME\", \"changed_files\": [\"$CHANGED_FILES\"]}" \
            --max-time 900 || echo '{"status":"error"}')

          echo "Response: $RESPONSE"

      - name: Read test result from PR labels
        id: check-result
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.detect-flow.outputs.pr_number }}
        run: |
          LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name')
          if echo "$LABELS" | grep -q "tests/passed"; then
            echo "test_status=passed" >> "$GITHUB_OUTPUT"
            echo "test_summary=Tests passed" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "tests/failed"; then
            echo "test_status=failed" >> "$GITHUB_OUTPUT"
            echo "test_summary=Tests failed" >> "$GITHUB_OUTPUT"
          else
            echo "test_status=unknown" >> "$GITHUB_OUTPUT"
            echo "test_summary=Test result unknown" >> "$GITHUB_OUTPUT"
          fi

  review:
    needs: [detect-flow, test]
    runs-on: ubuntu-latest
    if: needs.test.outputs.test_status == 'passed'
    outputs:
      review_decision: ${{ steps.check-review.outputs.review_decision }}

    steps:
      - name: Call reviewer
        env:
          PR_NUMBER: ${{ needs.detect-flow.outputs.pr_number }}
          FLOW_NAME: ${{ needs.detect-flow.outputs.flow_name }}
          TEST_SUMMARY: ${{ needs.test.outputs.test_summary }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
          CHAT_AGENT_URL: ${{ secrets.CHAT_AGENT_URL }}
        run: |
          echo "Calling /agent/review for PR #$PR_NUMBER flow=$FLOW_NAME"

          curl -sf \
            -X POST "$CHAT_AGENT_URL/agent/review" \
            -H "Authorization: Bearer $AGENT_SECRET" \
            -H "Content-Type: application/json" \
            -d "{\"pr_number\": $PR_NUMBER, \"flow_name\": \"$FLOW_NAME\", \"test_results\": \"$TEST_SUMMARY\"}" \
            --max-time 600 || echo "Reviewer call failed"

      - name: Read review decision from PR labels
        id: check-review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.detect-flow.outputs.pr_number }}
        run: |
          LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name')
          if echo "$LABELS" | grep -q "review/approved"; then
            echo "review_decision=approved" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "review/changes-requested"; then
            echo "review_decision=changes-requested" >> "$GITHUB_OUTPUT"
          else
            echo "review_decision=unknown" >> "$GITHUB_OUTPUT"
          fi

  iterate:
    needs: [detect-flow, test, review]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.detect-flow.result == 'success' &&
      needs.detect-flow.outputs.pr_number != '' &&
      (
        needs.test.outputs.test_status == 'failed' ||
        needs.review.outputs.review_decision == 'changes-requested'
      )

    steps:
      - name: Check iteration limit
        id: check-limit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.detect-flow.outputs.pr_number }}
          CURRENT_ITERATION: ${{ needs.detect-flow.outputs.iteration }}
        run: |
          if [ "$CURRENT_ITERATION" -ge 3 ]; then
            gh pr edit "$PR_NUMBER" --add-label "needs-human-intervention"
            gh pr comment "$PR_NUMBER" --body "## Agent Loop Exhausted

3 iterations reached. A human must review this PR manually.

Last test status: ${{ needs.test.outputs.test_status }}
Last review decision: ${{ needs.review.outputs.review_decision }}"
            echo "limit_reached=true" >> "$GITHUB_OUTPUT"
          else
            echo "limit_reached=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Iterate
        if: steps.check-limit.outputs.limit_reached == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.detect-flow.outputs.pr_number }}
          BRANCH: ${{ needs.detect-flow.outputs.branch }}
          CURRENT_ITERATION: ${{ needs.detect-flow.outputs.iteration }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
          CHAT_AGENT_URL: ${{ secrets.CHAT_AGENT_URL }}
        run: |
          NEXT=$((CURRENT_ITERATION + 1))
          FEEDBACK=$(gh pr view "$PR_NUMBER" --json comments --jq '.comments[-1].body' 2>/dev/null | head -50 || echo "Fix the issues found.")

          gh pr edit "$PR_NUMBER" --remove-label "iteration/$CURRENT_ITERATION" 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --add-label "iteration/$NEXT" 2>/dev/null || true

          curl -sf \
            -X POST "$CHAT_AGENT_URL/agent/iterate" \
            -H "Authorization: Bearer $AGENT_SECRET" \
            -H "Content-Type: application/json" \
            -d "{\"pr_number\": $PR_NUMBER, \"branch\": \"$BRANCH\", \"feedback\": \"$FEEDBACK\", \"iteration\": $NEXT}" \
            --max-time 900 || echo "Iterate call failed"

  summary:
    needs: [detect-flow, test, review, iterate]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Workflow summary
        run: |
          echo "## Agent Loop" >> "$GITHUB_STEP_SUMMARY"
          echo "- Flow: ${{ needs.detect-flow.outputs.flow_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR: ${{ needs.detect-flow.outputs.pr_number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tests: ${{ needs.test.outputs.test_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Review: ${{ needs.review.outputs.review_decision }}" >> "$GITHUB_STEP_SUMMARY"
