version: 0.0
os: linux

files:
  - source: /
    destination: /home/ubuntu/dagster/

permissions:
  - object: /home/ubuntu/dagster/
    pattern: "**"
    owner: ubuntu
    group: ubuntu 
    mode: 755

hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 300
      runas: root
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 300
      runas: root
  ApplicationStart:
    - location: scripts/start_application.sh
      timeout: 300
      runas: root
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 300
      runas: root
